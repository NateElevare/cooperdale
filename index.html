<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Attendance Tracker</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const Users = () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>;
        const Calendar = ({className = "w-6 h-6"}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>;
        const TrendingUp = ({className = "w-6 h-6"}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>;
        const Plus = ({className = "w-4 h-4"}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>;
        const X = ({className = "w-4 h-4"}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>;
        const Edit2 = ({className = "w-4 h-4"}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>;
        const Save = ({className = "w-4 h-4"}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>;
        const UserPlus = ({className = "w-4 h-4"}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>;

        const API_URL =
        window.location.hostname === "localhost"
            ? "http://localhost:5050"
            : window.location.origin;

        const ChurchAttendanceDB = () => {
            const [members, setMembers] = useState([]);
            const [events, setEvents] = useState([]);
            const [attendance, setAttendance] = useState([]);
            const [activeTab, setActiveTab] = useState('members');
            const [showMemberForm, setShowMemberForm] = useState(false);
            const [showEventForm, setShowEventForm] = useState(false);
            const [showAttendanceForm, setShowAttendanceForm] = useState(false);
            const [editingMember, setEditingMember] = useState(null);
            const [loading, setLoading] = useState(true);
            const [selectedEventFilter, setSelectedEventFilter] = useState('all');
            const [dateFilterType, setDateFilterType] = useState('all');
            const [singleDate, setSingleDate] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [ageFilter, setAgeFilter] = useState('all');
            const [directoryFilters, setDirectoryFilters] = useState({
                firstName: 'all',
                lastName: 'all',
                street: 'all',
                city: 'all',
                state: 'all',
                zip: 'all'
            });
            
            const [newMember, setNewMember] = useState({
                firstName: '', lastName: '', email: '', phone: '', birthDate: '', 
                joinDate: new Date().toISOString().split('T')[0],
                membershipDate: '', baptized: false, baptismDate: '', 
                street: '', city: '', state: '', zip: ''
            });
            
            const [newEvent, setNewEvent] = useState({
                name: '', type: 'weekly', date: new Date().toISOString().split('T')[0]
            });
            
            const [newAttendance, setNewAttendance] = useState({
                memberId: '', eventId: '', date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                fetchAllData();
            }, []);

            const fetchAllData = async () => {
                try {
                    const [membersRes, eventsRes, attendanceRes] = await Promise.all([
                        fetch(`${API_URL}/api/members`),
                        fetch(`${API_URL}/api/events`),
                        fetch(`${API_URL}/api/attendance`)
                    ]);
                    
                    setMembers(await membersRes.json());
                    setEvents(await eventsRes.json());
                    setAttendance(await attendanceRes.json());
                    setLoading(false);
                } catch (error) {
                    console.error('Error fetching data:', error);
                    alert('Error connecting to server.');
                    setLoading(false);
                }
            };

            const calculateAge = (birthDate) => {
                if (!birthDate) return 'N/A';
                const today = new Date();
                const birth = new Date(birthDate);
                let age = today.getFullYear() - birth.getFullYear();
                const m = today.getMonth() - birth.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
                return age;
            };

            const getAgeGroup = (age) => {
                if (age < 13) return 'Children (0-12)';
                if (age < 18) return 'Youth (13-17)';
                if (age < 35) return 'Young Adults (18-34)';
                if (age < 65) return 'Adults (35-64)';
                return 'Seniors (65+)';
            };

            const getFilteredAttendance = () => {
                return attendance.filter(record => {
                    if (selectedEventFilter !== 'all' && record.eventId !== parseInt(selectedEventFilter)) {
                        return false;
                    }

                    if (dateFilterType === 'single' && singleDate) {
                        if (record.date !== singleDate) return false;
                    } else if (dateFilterType === 'range' && startDate && endDate) {
                        if (record.date < startDate || record.date > endDate) return false;
                    }

                    if (ageFilter !== 'all') {
                        const member = members.find(m => m.id === record.memberId);
                        if (member && member.birthDate) {
                            const age = calculateAge(member.birthDate);
                            if (age === 'N/A') return false;
                            const ageGroup = getAgeGroup(age);
                            if (ageGroup !== ageFilter) return false;
                        } else {
                            return false;
                        }
                    }

                    return true;
                });
            };

            const reportsByAge = useMemo(() => {
                const ageGroups = {};
                members.forEach(member => {
                    if (!member.birthDate) return;
                    const age = calculateAge(member.birthDate);
                    if (age === 'N/A') return;
                    const group = getAgeGroup(age);
                    if (!ageGroups[group]) {
                        ageGroups[group] = { count: 0, totalAttendance: 0 };
                    }
                    ageGroups[group].count++;
                    ageGroups[group].totalAttendance += attendance.filter(a => a.memberId === member.id).length;
                });
                return ageGroups;
            }, [members, attendance]);

            const monthlyReports = useMemo(() => {
                const months = {};
                attendance.forEach(record => {
                    const date = new Date(record.date);
                    const monthKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                    if (!months[monthKey]) {
                        months[monthKey] = { total: 0, uniqueMembers: new Set() };
                    }
                    months[monthKey].total++;
                    months[monthKey].uniqueMembers.add(record.memberId);
                });
                
                return Object.entries(months).map(([month, data]) => ({
                    month,
                    totalAttendance: data.total,
                    uniqueAttendees: data.uniqueMembers.size,
                    avgPerEvent: events.length > 0 ? (data.total / events.length).toFixed(1) : '0'
                })).sort((a, b) => b.month.localeCompare(a.month));
            }, [attendance, events]);

            const memberAttendanceFrequency = useMemo(() => {
                return members.map(member => {
                    const memberAttendance = attendance.filter(a => a.memberId === member.id);
                    return {
                        ...member,
                        attendanceCount: memberAttendance.length,
                        frequency: memberAttendance.length > 0 ? 
                            `${memberAttendance.length} events` : 'No attendance'
                    };
                }).sort((a, b) => b.attendanceCount - a.attendanceCount);
            }, [members, attendance]);

            const getFilteredMembers = () => {
                return members.filter(member => {
                    if (directoryFilters.firstName !== 'all' && member.firstName !== directoryFilters.firstName) return false;
                    if (directoryFilters.lastName !== 'all' && member.lastName !== directoryFilters.lastName) return false;
                    if (directoryFilters.street !== 'all' && member.street !== directoryFilters.street) return false;
                    if (directoryFilters.city !== 'all' && member.city !== directoryFilters.city) return false;
                    if (directoryFilters.state !== 'all' && member.state !== directoryFilters.state) return false;
                    if (directoryFilters.zip !== 'all' && member.zip !== directoryFilters.zip) return false;
                    return true;
                });
            };

            const getUniqueValues = (field) => {
                const values = members.map(m => m[field]).filter(v => v && v.trim() !== '');
                return [...new Set(values)].sort();
            };

            const addMember = async () => {
                if (newMember.firstName && newMember.lastName) {
                    try {
                        const memberData = {
                            ...newMember,
                            name: `${newMember.firstName} ${newMember.lastName}`
                        };
                        await fetch(`${API_URL}/api/members`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(memberData)
                        });
                        await fetchAllData();
                        setNewMember({
                            firstName: '', lastName: '', email: '', phone: '', birthDate: '', 
                            joinDate: new Date().toISOString().split('T')[0],
                            membershipDate: '', baptized: false, baptismDate: '', 
                            street: '', city: '', state: '', zip: ''
                        });
                        setShowMemberForm(false);
                    } catch (error) {
                        alert('Error adding member');
                    }
                }
            };

            const updateMember = async () => {
                try {
                    await fetch(`${API_URL}/api/members/${editingMember.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(editingMember)
                    });
                    await fetchAllData();
                    setEditingMember(null);
                } catch (error) {
                    alert('Error updating member');
                }
            };

            const deleteMember = async (id) => {
                if (window.confirm('Are you sure you want to delete this member?')) {
                    try {
                        await fetch(`${API_URL}/api/members/${id}`, { method: 'DELETE' });
                        await fetchAllData();
                    } catch (error) {
                        alert('Error deleting member');
                    }
                }
            };

            const addEvent = async () => {
                if (newEvent.name && newEvent.date) {
                    try {
                        await fetch(`${API_URL}/api/events`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newEvent)
                        });
                        await fetchAllData();
                        setNewEvent({ name: '', type: 'weekly', date: new Date().toISOString().split('T')[0] });
                        setShowEventForm(false);
                    } catch (error) {
                        alert('Error adding event');
                    }
                }
            };

            const deleteEvent = async (id) => {
                if (window.confirm('Are you sure you want to delete this event?')) {
                    try {
                        await fetch(`${API_URL}/api/events/${id}`, { method: 'DELETE' });
                        await fetchAllData();
                    } catch (error) {
                        alert('Error deleting event');
                    }
                }
            };

            const addAttendance = async () => {
                if (newAttendance.memberId && newAttendance.eventId && newAttendance.date) {
                    try {
                        await fetch(`${API_URL}/api/attendance`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newAttendance)
                        });
                        await fetchAllData();
                        setNewAttendance({ memberId: '', eventId: '', date: new Date().toISOString().split('T')[0] });
                        setShowAttendanceForm(false);
                    } catch (error) {
                        alert('Error adding attendance');
                    }
                }
            };

            const deleteAttendance = async (id) => {
                try {
                    await fetch(`${API_URL}/api/attendance/${id}`, { method: 'DELETE' });
                    await fetchAllData();
                } catch (error) {
                    alert('Error deleting attendance');
                }
            };

            if (loading) {
                return <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center">
                    <div className="text-2xl text-blue-600">Loading...</div>
                </div>;
            }

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
                    <div className="max-w-7xl mx-auto">
                        <div className="bg-white rounded-lg shadow-xl overflow-hidden">
                            <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-white">
                                <h1 className="text-3xl font-bold flex items-center gap-3">
                                    <Users />
                                    Church Attendance Tracker
                                </h1>
                                <p className="mt-2 text-blue-100">Manage members, events, and track attendance</p>
                            </div>

                            <div className="border-b border-gray-200">
                                <nav className="flex">
                                    {['members', 'events', 'attendance', 'reports'].map(tab => (
                                        <button
                                            key={tab}
                                            onClick={() => setActiveTab(tab)}
                                            className={`px-6 py-4 font-medium capitalize ${
                                                activeTab === tab
                                                    ? 'border-b-2 border-blue-600 text-blue-600'
                                                    : 'text-gray-500 hover:text-gray-700'
                                            }`}
                                        >
                                            {tab}
                                        </button>
                                    ))}
                                </nav>
                            </div>

                            <div className="p-6">
                                {activeTab === 'members' && (
                                    <div>
                                        <div className="flex justify-between items-center mb-6">
                                            <h2 className="text-2xl font-bold text-gray-800">Members</h2>
                                            <button
                                                onClick={() => setShowMemberForm(!showMemberForm)}
                                                className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-blue-700"
                                            >
                                                <UserPlus />
                                                Add Member
                                            </button>
                                        </div>

                                        {showMemberForm && (
                                            <div className="bg-gray-50 p-4 rounded-lg mb-6">
                                                <h3 className="font-semibold mb-4">New Member</h3>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">First Name *</label>
                                                        <input
                                                            type="text"
                                                            value={newMember.firstName}
                                                            onChange={(e) => setNewMember({...newMember, firstName: e.target.value})}
                                                            className="px-3 py-2 border rounded w-full"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">Last Name *</label>
                                                        <input
                                                            type="text"
                                                            value={newMember.lastName}
                                                            onChange={(e) => setNewMember({...newMember, lastName: e.target.value})}
                                                            className="px-3 py-2 border rounded w-full"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                                        <input
                                                            type="email"
                                                            value={newMember.email}
                                                            onChange={(e) => setNewMember({...newMember, email: e.target.value})}
                                                            className="px-3 py-2 border rounded w-full"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                                                        <input
                                                            type="tel"
                                                            value={newMember.phone}
                                                            onChange={(e) => setNewMember({...newMember, phone: e.target.value})}
                                                            className="px-3 py-2 border rounded w-full"
                                                        />
                                                    </div>
                                                    <div className="col-span-2">
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">Street Address</label>
                                                        <input
                                                            type="text"
                                                            value={newMember.street}
                                                            onChange={(e) => setNewMember({...newMember, street: e.target.value})}
                                                            className="px-3 py-2 border rounded w-full"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">City</label>
                                                        <input
                                                            type="text"
                                                            value={newMember.city}
                                                            onChange={(e) => setNewMember({...newMember, city: e.target.value})}
                                                            className="px-3 py-2 border rounded w-full"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">State</label>
                                                        <input
                                                            type="text"
                                                            value={newMember.state}
                                                            onChange={(e) => setNewMember({...newMember, state: e.target.value})}
                                                            className="px-3 py-2 border rounded w-full"
                                                            maxLength="2"
                                                            placeholder="OH"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">ZIP Code</label>
                                                        <input
                                                            type="text"
                                                            value={newMember.zip}
                                                            onChange={(e) => setNewMember({...newMember, zip: e.target.value})}
                                                            className="px-3 py-2 border rounded w-full"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">Birth Date</label>
                                                        <input
                                                            type="date"
                                                            value={newMember.birthDate}
                                                            onChange={(e) => setNewMember({...newMember, birthDate: e.target.value})}
                                                            className="px-3 py-2 border rounded w-full"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">First Visit Date</label>
                                                        <input
                                                            type="date"
                                                            value={newMember.joinDate}
                                                            onChange={(e) => setNewMember({...newMember, joinDate: e.target.value})}
                                                            className="px-3 py-2 border rounded w-full"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">Church Membership Date</label>
                                                        <input
                                                            type="date"
                                                            value={newMember.membershipDate}
                                                            onChange={(e) => setNewMember({...newMember, membershipDate: e.target.value})}
                                                            className="px-3 py-2 border rounded w-full"
                                                        />
                                                    </div>
                                                    <div className="flex items-center gap-2 pt-6">
                                                        <input
                                                            type="checkbox"
                                                            id="baptized"
                                                            checked={newMember.baptized}
                                                            onChange={(e) => setNewMember({...newMember, baptized: e.target.checked})}
                                                            className="w-4 h-4"
                                                        />
                                                        <label htmlFor="baptized" className="font-medium">Baptized</label>
                                                    </div>
                                                    {newMember.baptized && (
                                                        <div>
                                                            <label className="block text-sm font-medium text-gray-700 mb-1">Baptism Date</label>
                                                            <input
                                                                type="date"
                                                                value={newMember.baptismDate}
                                                                onChange={(e) => setNewMember({...newMember, baptismDate: e.target.value})}
                                                                className="px-3 py-2 border rounded w-full"
                                                            />
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="flex gap-2 mt-4">
                                                    <button
                                                        onClick={addMember}
                                                        className="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700"
                                                    >
                                                        Save Member
                                                    </button>
                                                    <button
                                                        onClick={() => setShowMemberForm(false)}
                                                        className="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500"
                                                    >
                                                        Cancel
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        <div className="overflow-x-auto">
                                            <table className="w-full">
                                                <thead className="bg-gray-100">
                                                    <tr>
                                                        <th className="px-4 py-3 text-left">Name</th>
                                                        <th className="px-4 py-3 text-left">Address</th>
                                                        <th className="px-4 py-3 text-left">Email</th>
                                                        <th className="px-4 py-3 text-left">Phone</th>
                                                        <th className="px-4 py-3 text-left">Age</th>
                                                        <th className="px-4 py-3 text-left">Member Since</th>
                                                        <th className="px-4 py-3 text-left">Baptized</th>
                                                        <th className="px-4 py-3 text-left">Actions</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {members.map(member => (
                                                        <tr key={member.id} className="border-b hover:bg-gray-50">
                                                            {editingMember?.id === member.id ? (
                                                                <>
                                                                    <td className="px-4 py-3">
                                                                        <input
                                                                            type="text"
                                                                            value={editingMember.name || ''}
                                                                            onChange={(e) => setEditingMember({...editingMember, name: e.target.value})}
                                                                            className="px-2 py-1 border rounded w-full"
                                                                        />
                                                                    </td>
                                                                    <td className="px-4 py-3">
                                                                        <div className="space-y-1">
                                                                            <input
                                                                                type="text"
                                                                                placeholder="Street"
                                                                                value={editingMember.street || ''}
                                                                                onChange={(e) => setEditingMember({...editingMember, street: e.target.value})}
                                                                                className="px-2 py-1 border rounded w-full text-xs"
                                                                            />
                                                                            <div className="flex gap-1">
                                                                                <input
                                                                                    type="text"
                                                                                    placeholder="City"
                                                                                    value={editingMember.city || ''}
                                                                                    onChange={(e) => setEditingMember({...editingMember, city: e.target.value})}
                                                                                    className="px-2 py-1 border rounded w-32 text-xs"
                                                                                />
                                                                                <input
                                                                                    type="text"
                                                                                    placeholder="ST"
                                                                                    value={editingMember.state || ''}
                                                                                    onChange={(e) => setEditingMember({...editingMember, state: e.target.value})}
                                                                                    className="px-2 py-1 border rounded w-12 text-xs"
                                                                                    maxLength="2"
                                                                                />
                                                                                <input
                                                                                    type="text"
                                                                                    placeholder="ZIP"
                                                                                    value={editingMember.zip || ''}
                                                                                    onChange={(e) => setEditingMember({...editingMember, zip: e.target.value})}
                                                                                    className="px-2 py-1 border rounded w-20 text-xs"
                                                                                />
                                                                            </div>
                                                                        </div>
                                                                    </td>
                                                                    <td className="px-4 py-3">
                                                                        <input
                                                                            type="email"
                                                                            value={editingMember.email || ''}
                                                                            onChange={(e) => setEditingMember({...editingMember, email: e.target.value})}

                                                                <p className="text-2xl font-bold text-green-700">{uniqueMembers.size}</p>
                                                            </div>
                                                            <div>
                                                                <p className="text-sm text-gray-600">Events Filtered</p>
                                                                <p className="text-2xl font-bold text-green-700">
                                                                    {selectedEventFilter === 'all' ? events.length : 1}
                                                                </p>
                                                            </div>
                                                            <div>
                                                                <p className="text-sm text-gray-600">Age Group</p>
                                                                <p className="text-lg font-bold text-green-700">
                                                                    {ageFilter === 'all' ? 'All' : ageFilter}
                                                                </p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })()}

                                            <div className="space-y-4">
                                                {(() => {
                                                    const filteredAttendance = getFilteredAttendance();
                                                    const eventsToShow = selectedEventFilter === 'all' 
                                                        ? events 
                                                        : events.filter(e => e.id === parseInt(selectedEventFilter));

                                                    return eventsToShow.map(event => {
                                                        const eventAttendance = filteredAttendance.filter(a => a.eventId === event.id);
                                                        const attendees = eventAttendance.map(a => {
                                                            const member = members.find(m => m.id === a.memberId);
                                                            return member ? { ...member, attendanceDate: a.date } : null;
                                                        }).filter(m => m);
                                                        
                                                        if (attendees.length === 0 && selectedEventFilter !== 'all') {
                                                            return (
                                                                <div key={event.id} className="bg-gray-50 p-4 rounded-lg">
                                                                    <h3 className="font-semibold text-lg">{event.name}</h3>
                                                                    <p className="text-gray-500 italic mt-2">No attendance records match the current filters.</p>
                                                                </div>
                                                            );
                                                        }

                                                        if (attendees.length === 0) return null;

                                                        return (
                                                            <div key={event.id} className="bg-gray-50 p-4 rounded-lg">
                                                                <div className="flex justify-between items-start mb-3">
                                                                    <div>
                                                                        <h3 className="font-semibold text-lg">{event.name}</h3>
                                                                        <p className="text-sm text-gray-600">
                                                                            <span className="capitalize">{event.type}</span> • Created: {event.date}
                                                                        </p>
                                                                    </div>
                                                                    <span className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-medium">
                                                                        {attendees.length} attendee{attendees.length !== 1 ? 's' : ''}
                                                                    </span>
                                                                </div>
                                                                <div className="overflow-x-auto">
                                                                    <table className="w-full text-sm">
                                                                        <thead className="bg-gray-200">
                                                                            <tr>
                                                                                <th className="px-3 py-2 text-left">Name</th>
                                                                                <th className="px-3 py-2 text-left">Age</th>
                                                                                <th className="px-3 py-2 text-left">Age Group</th>
                                                                                <th className="px-3 py-2 text-left">Email</th>
                                                                                <th className="px-3 py-2 text-left">Phone</th>
                                                                                <th className="px-3 py-2 text-left">Attendance Date</th>
                                                                            </tr>
                                                                        </thead>
                                                                                                                                                                <tbody>
                                                                            {attendees.map((attendee, idx) => {
                                                                                const age = attendee.birthDate ? calculateAge(attendee.birthDate) : 'N/A';
                                                                                const ageGroup = (age !== 'N/A') ? getAgeGroup(age) : 'N/A';
                                                                                return (
                                                                                    <tr key={idx} className="border-b border-gray-200">
                                                                                        <td className="px-3 py-2 font-medium">{attendee.name}</td>
                                                                                        <td className="px-3 py-2">{age}</td>
                                                                                        <td className="px-3 py-2">{ageGroup}</td>
                                                                                        <td className="px-3 py-2">{attendee.email}</td>
                                                                                        <td className="px-3 py-2">{attendee.phone}</td>
                                                                                        <td className="px-3 py-2">{attendee.attendanceDate}</td>
                                                                                    </tr>
                                                                                );
                                                                            })}
                                                                        </tbody>
                                                                    </table>
                                                                </div>
                                                            </div>
                                                        );
                                                    });
                                                })()}
                                            </div>
                                        </div>

                                        <div>
                                            <h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                                <TrendingUp />
                                                Attendance by Age Group
                                            </h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                {Object.entries(reportsByAge).map(([group, data]) => (
                                                    <div key={group} className="bg-gradient-to-br from-blue-50 to-indigo-50 p-4 rounded-lg border border-blue-200">
                                                        <h3 className="font-semibold text-lg mb-2">{group}</h3>
                                                        <p className="text-gray-600">Members: {data.count}</p>
                                                        <p className="text-gray-600">Total Attendance: {data.totalAttendance}</p>
                                                        <p className="text-gray-600">Avg per Member: {(data.totalAttendance / data.count).toFixed(1)}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div>
                                            <h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                                <Calendar />
                                                Monthly Attendance Summary
                                            </h2>
                                            <div className="overflow-x-auto">
                                                <table className="w-full">
                                                    <thead className="bg-gray-100">
                                                        <tr>
                                                            <th className="px-4 py-3 text-left">Month</th>
                                                            <th className="px-4 py-3 text-left">Total Attendance</th>
                                                            <th className="px-4 py-3 text-left">Unique Attendees</th>
                                                            <th className="px-4 py-3 text-left">Avg per Event</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {monthlyReports.map(report => (
                                                            <tr key={report.month} className="border-b hover:bg-gray-50">
                                                                <td className="px-4 py-3 font-medium">{report.month}</td>
                                                                <td className="px-4 py-3">{report.totalAttendance}</td>
                                                                <td className="px-4 py-3">{report.uniqueAttendees}</td>
                                                                <td className="px-4 py-3">{report.avgPerEvent}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>

                                        <div>
                                            <h2 className="text-2xl font-bold text-gray-800 mb-4">Member Attendance Frequency</h2>
                                            <div className="overflow-x-auto">
                                                <table className="w-full">
                                                    <thead className="bg-gray-100">
                                                        <tr>
                                                            <th className="px-4 py-3 text-left">Member</th>
                                                            <th className="px-4 py-3 text-left">Age</th>
                                                            <th className="px-4 py-3 text-left">Total Events Attended</th>
                                                            <th className="px-4 py-3 text-left">Status</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {memberAttendanceFrequency.map(member => (
                                                            <tr key={member.id} className="border-b hover:bg-gray-50">
                                                                <td className="px-4 py-3 font-medium">{member.name}</td>
                                                                <td className="px-4 py-3">{calculateAge(member.birthDate)}</td>
                                                                <td className="px-4 py-3">{member.attendanceCount}</td>
                                                                <td className="px-4 py-3">
                                                                    <span className={`px-2 py-1 rounded text-sm ${
                                                                        member.attendanceCount === 0 ? 'bg-red-100 text-red-800' :
                                                                        member.attendanceCount < 3 ? 'bg-yellow-100 text-yellow-800' :
                                                                        'bg-green-100 text-green-800'
                                                                    }`}>
                                                                        {member.attendanceCount === 0 ? 'Inactive' :
                                                                         member.attendanceCount < 3 ? 'Occasional' : 'Regular'}
                                                                    </span>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<ChurchAttendanceDB />, document.getElementById('root'));
    </script>
</body>
</html>
